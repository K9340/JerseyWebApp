services:
  - type: web
    name: jersey-customizer-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    rootDir: backend
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jersey-db
          property: connectionString

databases:
  - name: jersey-db
    plan: free
